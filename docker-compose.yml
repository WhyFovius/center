name: shieldops

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shieldops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shieldops}
      POSTGRES_DB: ${POSTGRES_DB:-shieldops}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shieldops} -d ${POSTGRES_DB:-shieldops}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: docker
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:-please-change-me}
      POSTGRES_USER: ${POSTGRES_USER:-shieldops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shieldops}
      POSTGRES_DB: ${POSTGRES_DB:-shieldops}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
